            Height: =90
            Width: =240
            Fill: =If (currentCategory = Self.Text, ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            OnSelect: |-
                =Set(currentCategory, Self.Text);
            X: =30

    contHotDrinks As groupContainer.manualLayoutContainer:
        Fill: =RGBA(215, 223, 240, 1)
        Height: =HomeScreen.Height - Self.Y
        Visible: =currentCategory = "Hot Drinks"
        Width: =900
        X: =0
        Y: =lblHeader.Height
        ZIndex: =3

        icoHotDrinksCancel As icon.Cancel:
            AccessibleLabel: =Self.Tooltip
            Height: =80
            Icon: =Icon.Cancel
            OnSelect: |
                =Set(currentCategory, "");
            PaddingBottom: =10
            PaddingLeft: =10
            PaddingRight: =10
            PaddingTop: =10
            TabIndex: =0
            Tooltip: ="Cancel"
            Width: =80
            X: =Parent.Width - Self.Width - 12
            Y: =17
            ZIndex: =1

        galHotDrinks As gallery.galleryHorizontal:
            Items: =hotDrinkList
            ShowScrollbar: =false
            TemplateSize: =270
            Width: =Parent.Width - 82
            Height: =660
            X: =0
            Y: =17
            WrapCount: =6
            ZIndex: =1

            btnGalHotDrinks As button:
                Height: =90
                OnSelect: |-
                    =Collect(orderList, { quan: 1, id: ThisItem.id, name: ThisItem.name, price: ThisItem.price, size: ThisItem.size });
                Text: =Substitute(ThisItem.name, "\n", Char(10))
                Width: =240
                X: =0
                Y: =0
                ZIndex: =2

