HomeScreen As screen:

    lblHeader As label:
        Align: =Align.Center
        Color: =RGBA(215, 223, 240, 1)
        Fill: =RGBA(50, 86, 160, 1)
        FontWeight: =FontWeight.Bold
        Height: =60
        Size: =24
        Text: ="Contoso Coffee Acclerator"
        Width: =HomeScreen.Width
        ZIndex: =1

    contLeftNav As groupContainer.manualLayoutContainer:
        Fill: =RGBA(175, 191, 224, 1)
        Height: =HomeScreen.Height - Self.Y
        Width: =300
        Y: =lblHeader.Height
        ZIndex: =2

        btnHotDrinks As button:
            Text: ="Hot Drinks"
            Y: =20
            ZIndex: =1
            Height: =90
            Width: =240
            Fill: =If (currentCategory = Self.Text, ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            OnSelect: |-
                =Set(currentCategory, Self.Text);
            X: =30

        btnColdDrinks As button:
            Text: ="Cold Drinks"
            Y: =130
            ZIndex: =2
            Height: =90
            Width: =240
            Fill: =If (currentCategory = Self.Text, ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            OnSelect: |-
                =Set(currentCategory, Self.Text);
            X: =30

        btnBreakfast As button:
            Text: ="Breakfast"
            Y: =240
            ZIndex: =4
            Height: =90
            Width: =240
            Fill: =If (currentCategory = Self.Text, ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            OnSelect: |-
                =Set(currentCategory, Self.Text);
            X: =30

        btnLunch As button:
            Text: ="Lunch"
            Y: =350
            ZIndex: =5
            Height: =90
            Width: =240
            Fill: =If (currentCategory = Self.Text, ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            OnSelect: |-
                =Set(currentCategory, Self.Text);
            X: =30

        btnSnacks As button:
            Text: ="Snacks"
            Y: =460
            ZIndex: =6
            Height: =90
            Width: =240
            Fill: =If (currentCategory = Self.Text, ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            OnSelect: |-
                =Set(currentCategory, Self.Text);
            X: =30

    contHotDrinks As groupContainer.manualLayoutContainer:
        Visible: =currentCategory = "Hot Drinks"
        Fill: =RGBA(215, 223, 240, 1)
        Height: =HomeScreen.Height - Self.Y
        Width: =HomeScreen.Width - Self.X
        X: =contLeftNav.Width
        Y: =lblHeader.Height
        ZIndex: =3

        galHotDrinks As gallery.galleryHorizontal:
            Items: =Filter(drinkList, isHot)
            ShowScrollbar: =false
            TemplateSize: =270
            Width: =Parent.Width
            Height: =660
            X: =0
            Y: =17
            WrapCount: =6
            ZIndex: =1

            btnGalHotDrinks As button:
                Height: =90
                OnSelect: |-
                    =Set(thisItem, ThisItem);
                    Navigate(DrinkScreen)
                Text: =Substitute(ThisItem.name, "\n", Char(10))
                Width: =240
                X: =0
                Y: =0
                ZIndex: =2

    contColdDrinks As groupContainer.manualLayoutContainer:
        Visible: =currentCategory = "Cold Drinks"
        Fill: =RGBA(215, 223, 240, 1)
        Height: =HomeScreen.Height - Self.Y
        Width: =HomeScreen.Width - Self.X
        X: =contLeftNav.Width
        Y: =lblHeader.Height
        ZIndex: =3

        galColdDrinks As gallery.galleryHorizontal:
            Items: =Filter(drinkList, !isHot)
