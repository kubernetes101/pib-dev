    contReceipt As groupContainer.manualLayoutContainer:
        Fill: =RGBA(175, 191, 224, 1)
        Height: =HomeScreen.Height - Self.Y
        Visible: =!IsEmpty(orderList)
        Width: =300
        X: =Parent.Width - Self.Width
        Y: =lblHeader.Height
        ZIndex: =2

        "galReceipt As gallery.'BrowseLayout_Vertical_OneTextVariant_ver4.0'":
            Items: =orderList
            Layout: =Layout.Vertical
            ShowScrollbar: =true
            TemplateSize: =40
            Width: =Parent.Width - 24
            Height: =600
            X: =0
            Y: =17
            WrapCount: =1
            ZIndex: =1

            lblReceipt As label:
                Align: =Align.Left
                Color: =RGBA(215, 223, 240, 1)
                Fill: =RGBA(50, 86, 160, 1)
                FontWeight: =FontWeight.Semibold
                Height: =20
                Size: =14
                Text: =ThisItem.id & Char(9) & ThisItem.price
                Width: =Parent.Width - 12
                ZIndex: =1

        btnReceiptReset As button:
            Text: ="Reset"
            Y: =Parent.Height - Self.Height - 12
            ZIndex: =6
            Height: =60
            Width: =120
            Fill: =RGBA(56, 96, 178, 1)
            OnSelect: |-
                =Clear(orderList);
            X: =(Parent.Width - Self.Width) / 2 
