DetailScreen As screen:
    Fill: =RGBA(215, 223, 240, 1)

    lblDetailHeader As label:
        Text: =currentItem.type & " Details"
        Align: =Align.Center
        Color: =RGBA(215, 223, 240, 1)
        Fill: =RGBA(50, 86, 160, 1)
        FontWeight: =FontWeight.Bold
        Height: =60
        Size: =24
        Width: =HomeScreen.Width

    lblItemId As Label:
        Text: ="Id"
        Y: =80
        Align: =Align.Right
        Color: =RGBA(39, 67, 125, 1)
        FontWeight: =FontWeight.Bold
        Height: =40
        Size: =14
        Width: =160

    valItemId As Label:
        Y: =80
        Text: =thisItem.id
        Align: =Align.Left
        BorderColor: =RGBA(0, 18, 107, 1)
        BorderStyle: =BorderStyle.Solid
        BorderThickness: =2
        Color: =RGBA(39, 67, 125, 1)
        FontWeight: =FontWeight.Semibold
        Height: =40
        Size: =14
        Width: =480
        X: =180

    lblItemName As Label:
        Text: ="Name"
        Y: =140
        Align: =Align.Right
        Color: =RGBA(39, 67, 125, 1)
        FontWeight: =FontWeight.Bold
        Height: =40
        Size: =14
        Width: =160

    valItemName As Label:
        Y: =140
        Text: =thisItem.name
        Align: =Align.Left
        BorderColor: =RGBA(0, 18, 107, 1)
        BorderStyle: =BorderStyle.Solid
        BorderThickness: =2
        Color: =RGBA(39, 67, 125, 1)
        FontWeight: =FontWeight.Semibold
        Height: =40
        Size: =14
        Width: =480
        X: =180

    lblItemPrice As Label:
        Text: ="Price"
        Y: =200
        Align: =Align.Right
        Color: =RGBA(39, 67, 125, 1)
        FontWeight: =FontWeight.Bold
        Height: =40
        Size: =14
        Width: =160

    valItemPrice As Label:
        Y: =200
        Text: =thisItem.price
        Align: =Align.Left
        BorderColor: =RGBA(0, 18, 107, 1)
        BorderStyle: =BorderStyle.Solid
        BorderThickness: =2
        Color: =RGBA(39, 67, 125, 1)
        FontWeight: =FontWeight.Semibold
        Height: =40
        Size: =14
        Width: =480
        X: =180

    lblItemSize As Label:
        Text: ="Size"
        Y: =260
        Align: =Align.Right
        Color: =RGBA(39, 67, 125, 1)
        FontWeight: =FontWeight.Bold
        Height: =40
        Size: =14
        Width: =160
        Visible: =currentItem.type = "Drink"

    valItemSize As Label:
        Y: =260
        Text: =thisItem.size
        Align: =Align.Left
        BorderColor: =RGBA(0, 18, 107, 1)
        BorderStyle: =BorderStyle.Solid
        BorderThickness: =2
        Color: =RGBA(39, 67, 125, 1)
        FontWeight: =FontWeight.Semibold
        Height: =40
        Size: =14
        Width: =480
        X: =180
        Visible: =currentItem.type = "Drink"

    lblDrinkIsHot As Label:
        Text: ="Is Hot Drink"
        Y: =320
        Align: =Align.Right
        Color: =RGBA(39, 67, 125, 1)
        FontWeight: =FontWeight.Bold
        Height: =40
        Size: =14
        Width: =160
        Visible: =currentItem.type = "Drink"

    valDrinkIsHot As Label:
        Y: =320
        Text: =thisItem.isHot
        Align: =Align.Left
        BorderColor: =RGBA(0, 18, 107, 1)
        BorderStyle: =BorderStyle.Solid
        BorderThickness: =2
        Color: =RGBA(39, 67, 125, 1)
        FontWeight: =FontWeight.Semibold
        Height: =40
        Size: =14
        Width: =480
        X: =180
        Visible: =currentItem.type = "Drink"

    btnItemOk As button:
        X: =180
        Y: =400
        Height: =60
        Width: =120
        Size: =24
        FontWeight: =FontWeight.Bold
        Text: ="OK"
        OnSelect: |-
            =Navigate(HomeScreen);
