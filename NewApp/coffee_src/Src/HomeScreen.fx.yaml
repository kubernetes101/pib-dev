HomeScreen As screen:
    OnVisible: |
        =Set(currentScreen, "Home");
        Set(disablePopup, false);

    lblHeader As label:
        Align: =Align.Center
        Color: =RGBA(215, 223, 240, 1)
        Fill: =RGBA(39, 67, 125, 1)
        FontWeight: =FontWeight.Bold
        Height: =60
        Size: =24
        Text: ="Contoso Coffee - SKU Manager"
        Width: =HomeScreen.Width
        Wrap: =false
        ZIndex: =1

    contLeftNav As groupContainer.verticalAutoLayoutContainer:
        Fill: =RGBA(175, 191, 224, 1)
        Height: =HomeScreen.Height - contLeftNav.Y
        LayoutAlignItems: =LayoutAlignItems.Center
        LayoutDirection: =LayoutDirection.Vertical
        LayoutGap: |
            =24
        LayoutMode: =LayoutMode.Auto
        PaddingTop: =12
        Width: =300
        Y: =lblHeader.Height
        ZIndex: =2

        btnCoffees As button:
            Fill: =If (currentCategory = "Coffee", ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            Height: =60
            OnSelect: |-
                =UpdateContext({currentCategory: "Coffee"});
            Size: =20
            Text: ="Coffees"
            Width: =240
            ZIndex: =1

        btnTeas As button:
            Fill: =If (currentCategory = "Tea", ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            Height: =60
            OnSelect: |-
                =UpdateContext({currentCategory: "Tea"});
            Size: =20
            Text: ="Teas"
            Width: =240
            ZIndex: =2

        btnSizes As button:
            Fill: =If (currentCategory = "Size", ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            Height: =60
            OnSelect: |-
                =UpdateContext({currentCategory: "Size"});
            Size: =20
            Text: ="Sizes"
            Width: =240
            ZIndex: =3

        btnMilk As button:
            Fill: =If (currentCategory = "Milk", ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            Height: =60
            OnSelect: |-
                =UpdateContext({currentCategory: "Milk"});
            Size: =20
            Text: ="Milk Types"
            Width: =240
            ZIndex: =4

        btnSweet As button:
            Fill: =If (currentCategory = "Sweet", ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            Height: =60
            OnSelect: |-
                =UpdateContext({currentCategory: "Sweet"});
            Size: =20
            Text: ="Sweeteners"
            Width: =240
            ZIndex: =5

    contMain As groupContainer.manualLayoutContainer:
        Fill: =RGBA(215, 223, 240, 1)
        Height: =HomeScreen.Height - contMain.Y
        Width: =HomeScreen.Width - contMain.X
        X: =contLeftNav.Width
        Y: =lblHeader.Height
        ZIndex: =3

        "galCoffee As gallery.'BrowseLayout_Vertical_OneTextOneImageVariant_ver4.0'":
            Height: =contMain.Height - galCoffee.Y - galCoffee.X
            Items: =Filter(coffeeList, txtSearch.Text in id || txtSearch.Text in name || txtSearch.Text in name)
            Layout: =Layout.Vertical
            TemplatePadding: =0
            TemplateSize: =Min(128, Self.Height - 60)
            Visible: =currentCategory = "Coffee"
            Width: =contMain.Width - galCoffee.X * 2
            X: =20
            Y: =120
            ZIndex: =1

            Image3 As image:
                Height: =96
                Image: =Coffee
                OnSelect: =Select(Parent)
                Width: =96
                X: =16
                Y: =(Parent.TemplateHeight / 2) - (Self.Height / 2)
                ZIndex: =1

            Title3 As label:
                Height: =Self.Size * 1.8
                OnSelect: =Select(Parent)
                PaddingBottom: =0
                PaddingLeft: =0
                PaddingRight: =0
                PaddingTop: =0
                Text: =ThisItem.name
                VerticalAlign: =VerticalAlign.Top
                Width: =Parent.TemplateWidth - Image3.Width - 104
                X: =Image3.X + Image3.Width + 24
                Y: =(Parent.TemplateHeight / 2) - (Self.Height / 2)
                ZIndex: =2

            NextArrow3 As icon.ChevronRight:
                AccessibleLabel: =Self.Tooltip
                Height: =60
                Icon: =Icon.Trash
                OnSelect: |
                    =Remove(coffeeList, ThisItem);
                PaddingBottom: =10
                PaddingLeft: =10
                PaddingRight: =10
                PaddingTop: =10
                TabIndex: =0
                Tooltip: ="View item details"
                Width: =60
                X: =Parent.TemplateWidth - Self.Width - 5
                Y: =(Parent.TemplateHeight / 2) - (Self.Height / 2)
                ZIndex: =3

            Separator4 As rectangle:
                Height: =1
                OnSelect: =Select(Parent)
                Width: =Parent.TemplateWidth
                Y: =Parent.TemplateHeight - 1
                ZIndex: =4

