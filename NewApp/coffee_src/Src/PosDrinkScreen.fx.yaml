PosDrinkScreen As screen:
    Fill: =RGBA(215, 223, 240, 1)
    OnVisible: =Clear(drinkList);

    Gallery2 As gallery.galleryHorizontal:
        Height: =93
        Items: =sizeList
        ShowScrollbar: =false
        TemplatePadding: =0
        TemplateSize: =180
        Width: =1366
        Y: =35
        ZIndex: =1

        Button1 As button:
            Fill: =If(ThisItem.id = size, ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            OnSelect: |-
                =UpdateContext({size: ThisItem.id})
            Text: =ThisItem.name
            X: =40
            Y: =40
            ZIndex: =1

    Container1 As groupContainer.manualLayoutContainer:
        Height: =586
        Width: =1306
        X: =30
        Y: =170
        ZIndex: =1

        Container2 As groupContainer.verticalAutoLayoutContainer:
            Height: =578
            LayoutDirection: =LayoutDirection.Vertical
            LayoutMode: =LayoutMode.Auto
            Width: =300
            ZIndex: =1

            Label2 As label:
                Align: =Align.Center
                AlignInContainer: =AlignInContainer.Center
                Color: =RGBA(215, 223, 240, 1)
                Fill: =RGBA(50, 86, 160, 1)
                FontWeight: =FontWeight.Bold
                Size: =16
                Text: ="Sweeteners"
                Width: =300
                ZIndex: =1

            Gallery3 As gallery.galleryVertical:
                AlignInContainer: =AlignInContainer.SetByContainer
                Items: =sweetList
                Layout: =Layout.Vertical
                LayoutMinHeight: =287
                LayoutMinWidth: =320
                ShowScrollbar: =false
                TemplateSize: =80
                Width: =300
                ZIndex: =1

                Button6 As button:
                    Height: =60
                    OnSelect: =Collect(drinkList, ThisItem.id);
                    Text: =ThisItem.name
                    Width: =200
                    X: =40
                    Y: =40
                    ZIndex: =1

        Container2_1 As groupContainer.verticalAutoLayoutContainer:
            Height: =578
            LayoutDirection: =LayoutDirection.Vertical
            LayoutMode: =LayoutMode.Auto
            Width: =300
            X: =340
            ZIndex: =2

            Label2_1 As label:
                Align: =Align.Center
                AlignInContainer: =AlignInContainer.Center
                Color: =RGBA(215, 223, 240, 1)
                Fill: =RGBA(50, 86, 160, 1)
                FontWeight: =FontWeight.Bold
                Size: =16
                Text: ="Milk"
                Width: =300
                ZIndex: =1

            Gallery3_1 As gallery.galleryVertical:
                AlignInContainer: =AlignInContainer.SetByContainer
                Items: =milkList
                Layout: =Layout.Vertical
                LayoutMinHeight: =287
                LayoutMinWidth: =320
                ShowScrollbar: =false
                TemplateSize: =80
                Width: =300
                ZIndex: =2

                Button5 As button:
                    Height: =60
                    OnSelect: =Collect(drinkList, ThisItem.id);
                    Text: =ThisItem.name
                    Width: =200
                    X: =40
                    Y: =40
                    ZIndex: =1

        ListBox1 As listbox:
            Height: =521
            Items: =drinkList
            X: =770
            Y: =25
            ZIndex: =3

    Label1 As label:
        Align: =Align.Center
        Color: =RGBA(215, 223, 240, 1)
        Fill: =RGBA(50, 86, 160, 1)
        FontWeight: =FontWeight.Bold
        Height: =60
        Size: =24
        Text: ="Drink Details"
        Width: =1366
        ZIndex: =2

    Icon2 As icon.Save:
        Color: =RGBA(215, 223, 240, 1)
        Height: =40
        Icon: =Icon.Save
        OnSelect: =Navigate(PosScreen);
        Width: =40
        X: =1296
        Y: =10
        ZIndex: =3

