                =UpdateContext({showCode:true})
            PressedBorderColor: =RGBA(0, 0, 0, 0)
            PressedColor: |-
                =ColorValue("#1A37D3")
            PressedFill: =RGBA(0, 0, 0, 0)
            Size: =17
            Text: =Upper("Get Code")
            Tooltip: ="Get Code"
            Visible: =showPopup && !showCode && !disablePopup && !disableCode
