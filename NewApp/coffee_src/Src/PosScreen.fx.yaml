PosScreen As screen:
    OnVisible: |
        =Set(currentScreen, "POS");
        Set(discount,1);
        UpdateContext({showCode:false,showPopup:true})

    lblPosHeader As label:
        Align: =Align.Center
        Color: =RGBA(215, 223, 240, 1)
        Fill: =RGBA(39, 67, 125, 1)
        FontWeight: =FontWeight.Bold
        Height: =60
        Size: =24
        Text: ="Contoso Coffee - POS"
        Width: =PosScreen.Width
        Wrap: =false
        ZIndex: =1

    contPosLeftNav As groupContainer.verticalAutoLayoutContainer:
        Fill: =RGBA(175, 191, 224, 1)
        Height: =PosScreen.Height - contPosLeftNav.Y
        LayoutAlignItems: =LayoutAlignItems.Center
        LayoutDirection: =LayoutDirection.Vertical
        LayoutGap: |
            =24
        LayoutMode: =LayoutMode.Auto
        PaddingTop: =12
        Width: =300
        Y: =lblPosHeader.Height
        ZIndex: =2

        btnPosCoffeeHot As button:
            Fill: =If (currentCategory = "Coffee" && isHotFilter, ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            Height: =60
            OnSelect: |+
                =UpdateContext({currentCategory: "Coffee", isHotFilter: true});
                
            Size: =20
            Text: ="Hot Coffee"
            Width: =240
            ZIndex: =2

        btnPosCoffeeCold As button:
            Fill: =If (currentCategory = "Coffee" && !isHotFilter, ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            Height: =60
            OnSelect: |-
                =UpdateContext({currentCategory: "Coffee", isHotFilter: false});
            Size: =20
            Text: ="Iced Coffee"
            Width: =240
            ZIndex: =3

        btnPosTea As button:
            Fill: =If (currentCategory = "Tea", ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            Height: =60
            OnSelect: |-
                =UpdateContext({currentCategory: "Tea", isHotFilter: true});
            Size: =20
            Text: ="Tea"
            Width: =240
            ZIndex: =4

        btnPosBreakfast As button:
            Fill: =If (currentCategory = "Breakfast", ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            Height: =60
            OnSelect: |-
                =UpdateContext({currentCategory: "Breakfast"});
            Size: =20
            Text: ="Breakfast"
            Width: =240
            ZIndex: =5

        btnPosLunch As button:
            Fill: =If (currentCategory = "Lunch", ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            Height: =60
            OnSelect: |-
                =UpdateContext({currentCategory: "Lunch"});
            Size: =20
            Text: ="Lunch"
            Width: =240
            ZIndex: =6

        btnPosSnacks As button:
            Fill: =If (currentCategory = "Snacks", ColorFade(RGBA(56, 96, 178, 1), -40%), RGBA(56, 96, 178, 1))
            Height: =60
            OnSelect: |-
                =UpdateContext({currentCategory: "Snacks"});
            Size: =20
            Text: ="Snacks"
            Width: =240
            ZIndex: =7

    contPosMain As groupContainer.manualLayoutContainer:
        Fill: =RGBA(215, 223, 240, 1)
        Height: =PosScreen.Height - contPosMain.Y
        Width: =PosScreen.Width - contPosMain.X
        X: =contPosLeftNav.Width
        Y: =lblPosHeader.Height
        ZIndex: =3

        galPosCoffee As gallery.galleryHorizontal:
            Height: =700
            Items: =Filter(coffeeList, isHot = isHotFilter)
            ShowScrollbar: =false
            TemplateSize: =If(Self.Layout = Layout.Horizontal, Min(320, Self.Width - 60), Min(320, Self.Height - 60))
            Visible: =currentCategory = "Coffee"
            Width: =600
            WrapCount: =5
            ZIndex: =1

            Button3 As button:
                Height: =80
                OnSelect: |-
                    =Navigate(PosDrinkScreen);
                    
                    If(ThisItem.name in orderList.name,
                    UpdateIf(orderList,
                             name = ThisItem.name,
                             { quan: (quan + 1) }),Collect(orderList, { quan: 1, name: ThisItem.name, price: 3.49 }));
                Text: =ThisItem.name
                Width: =200
                X: =40
                Y: =40
                ZIndex: =1

        "galPosOrder As gallery.'BrowseLayout_Vertical_OneTextVariant_ver4.0'":
            Height: =398
            Items: =orderList
            Layout: =Layout.Vertical
            TemplatePadding: =0
            TemplateSize: =40
            Visible: =CountRows(orderList) > 0
            Width: =473
            X: =587
            Y: =28
            ZIndex: =1

            Title4 As label:
                FontWeight: =FontWeight.Normal
                Height: =Self.Size * 1.8
                OnSelect: =Select(Parent)
                PaddingBottom: =0
                PaddingLeft: =0
                PaddingRight: =0
                PaddingTop: =0
                Size: =12
                Text: =ThisItem.quan & "  " & ThisItem.price & "    " & ThisItem.name 
                VerticalAlign: =VerticalAlign.Top
                Width: =Parent.TemplateWidth - 104
                X: =32
                Y: =(Parent.TemplateHeight / 2) - (Self.Height / 2)
                ZIndex: =1

            NextArrow4 As icon.ChevronRight:
                AccessibleLabel: =Self.Tooltip
                Height: =30
                Icon: =Icon.Trash
                OnSelect: |
                    =Remove(orderList, ThisItem);
                PaddingBottom: =2
                PaddingLeft: =2
                PaddingRight: =2
                PaddingTop: =2
                TabIndex: =0
                Tooltip: ="View item details"
                Width: =30
                X: =440
                Y: =5
                ZIndex: =2

            Label3 As label:
                FontWeight: =FontWeight.Bold
                Height: =35
                OnSelect: =Select(Parent)
                Size: =12
                Text: =ThisItem.quan * ThisItem.price
                Width: =66
                X: =391
                Y: =5
                ZIndex: =3

            Separator1 As rectangle:
                Height: =1
                OnSelect: =Select(Parent)
                Width: =Parent.TemplateWidth
                Y: =Parent.TemplateHeight - 1
                ZIndex: =4

        galPosTea As gallery.galleryHorizontal:
            Height: =700
            Items: =teaList
            ShowScrollbar: =false
            TemplateSize: =If(Self.Layout = Layout.Horizontal, Min(320, Self.Width - 60), Min(320, Self.Height - 60))
            Visible: =currentCategory = "Tea"
            Width: =600
            WrapCount: =5
            ZIndex: =2

            Button3_1 As button:
                Height: =80
                OnSelect: |-
                    =If(ThisItem.name in orderList.name,
                    UpdateIf(orderList,
                             name = ThisItem.name,
                             { quan: (quan + 1) }),Collect(orderList, { quan: 1, name: ThisItem.name, price: 3.49 }));
                Text: =ThisItem.name
                Width: =200
                X: =40
                Y: =40
                ZIndex: =1

        galPosBreakfast As gallery.galleryHorizontal:
            Height: =700
            Items: =breakfastList
            ShowScrollbar: =false
            TemplateSize: =If(Self.Layout = Layout.Horizontal, Min(320, Self.Width - 60), Min(320, Self.Height - 60))
            Visible: =currentCategory = "Breakfast"
            Width: =600
            WrapCount: =5
            ZIndex: =3

            Button3_2 As button:
                Height: =80
                OnSelect: |-
                    =If(ThisItem.name in orderList.name,
                    UpdateIf(orderList,
                             name = ThisItem.name,
                             { quan: (quan + 1) }),Collect(orderList, { quan: 1, name: ThisItem.name, price: ThisItem.price}));
                Text: =ThisItem.name
                Width: =200
                X: =40
                Y: =40
                ZIndex: =1

        galPosLunch As gallery.galleryHorizontal:
            Height: =700
            Items: =lunchList
            ShowScrollbar: =false
            TemplateSize: =If(Self.Layout = Layout.Horizontal, Min(320, Self.Width - 60), Min(320, Self.Height - 60))
            Visible: =currentCategory = "Lunch"
            Width: =600
            WrapCount: =5
            ZIndex: =4

            Button3_3 As button:
                Height: =80
                OnSelect: |-
                    =If(ThisItem.name in orderList.name,
                    UpdateIf(orderList,
                             name = ThisItem.name,
                             { quan: (quan + 1) }),Collect(orderList, { quan: 1, name: ThisItem.name, price: ThisItem.price}));
                Text: =ThisItem.name
                Width: =200
                X: =40
                Y: =40
                ZIndex: =1

        galPosSnacks As gallery.galleryHorizontal:
            Height: =700
            Items: =snacksList
            ShowScrollbar: =false
            TemplateSize: =If(Self.Layout = Layout.Horizontal, Min(320, Self.Width - 60), Min(320, Self.Height - 60))
            Visible: =currentCategory = "Snacks"
            Width: =600
            WrapCount: =5
            ZIndex: =5

            Button3_4 As button:
                Height: =80
                OnSelect: |-
                    =If(ThisItem.name in orderList.name,
                    UpdateIf(orderList,
                             name = ThisItem.name,
                             { quan: (quan + 1) }),Collect(orderList, { quan: 1, name: ThisItem.name, price: ThisItem.price}));
                Text: =ThisItem.name
                Width: =200
                X: =40
                Y: =40
                ZIndex: =1

        grpCheckout As group:
            Height: =5
            Width: =5
            X: =40
            Y: =40
            ZIndex: =12

            btnCheckout As button:
                Height: =58
                OnSelect: |-
                    =Clear(orderList);
                    Set(discount,1);
                Text: |-
                    ="Checkout: $" & Text(((Sum(galPosOrder.AllItems,price*quan)*discount) + Round((.064*((Sum(galPosOrder.AllItems,price*quan))*discount)),2)),"#.00")
                Visible: =CountRows(orderList) > 0
                Width: =213
                X: =831
                Y: =624
                ZIndex: =6

            lblTax As label:
                Height: =39
                Size: =15
                Text: |-
                    ="Tax:                 $" & Text(Round((.064*(Sum(galPosOrder.AllItems,price*quan))),2),"#.00")
                Visible: =CountRows(orderList) > 0
                Width: =213
                X: =831
                Y: =560
                ZIndex: =7

            lblSubtotal As label:
                Size: =15
                Text: |-
                    ="Subtotal:        $" & Text((Sum(galPosOrder.AllItems,price*quan)*discount), "#.00")
                Visible: =CountRows(orderList) > 0
                Width: =213
                X: =831
                Y: =520
                ZIndex: =8

            txtDiscountCode As text:
                Default: ="COFFEE05"
                HintText: ="Enter Code"
                Reset: =CountRows(orderList) <= 0
                Visible: =btnCheckout.Visible
                Width: =123
                X: =831
                Y: =434
                ZIndex: =9

            btnApply As button:
                OnSelect: |-
                    =If(disableCode || !(txtDiscountCode.Text = "COFFEE05"),
                    Notify(
                            "Invalid Code",
                            NotificationType.Information,
                            1400
                        );,
                    Set(discount,.95);
                    Notify("5% off discount applied",
                            NotificationType.Success,
                            1400);
                    )
                Size: =13
                Text: ="Apply"
                Tooltip: ="Apply Discount"
                Visible: =btnCheckout.Visible
                Width: =78
                X: =966
                Y: =434
                ZIndex: =10

            lblDiscount As label:
                Height: =37
                Size: =lblSubtotal.Size
                Text: |-
                    ="Discount:      -$" & Text((Sum(galPosOrder.AllItems,price*quan)*(1-discount)), "#0.00")
                Visible: =btnCheckout.Visible
                Width: =213
                X: =831
                Y: =483
                ZIndex: =11

    icoSettings As icon.Settings:
        Color: =RGBA(215, 223, 240, 1)
        Height: =49
        Icon: =Icon.Settings
        OnSelect: =Navigate(HomeScreen)
        Width: =52
        X: =1301
        Y: =5
        ZIndex: =4

    grpDiscountPopup As group:
        Height: =5
