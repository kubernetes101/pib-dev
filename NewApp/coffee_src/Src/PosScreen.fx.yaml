            Width: =1366
            ZIndex: =5

        Image As image:
            BorderColor: =RGBA(101, 128, 187, 1)
            BorderStyle: =BorderStyle.None
            DisabledBorderColor: =RGBA(159, 167, 165, 1)
            DisabledFill: =RGBA(193, 193, 193, 0.95)
            FocusedBorderColor: =Image.BorderColor
            Height: =366
            HoverBorderColor: =ColorFade(Image.BorderColor, 20%)
            HoverFill: =ColorFade(Image.Fill, 20%)
            Image: =Android_Dialog
            PressedBorderColor: =ColorFade(Image.BorderColor, -20%)
            PressedFill: =ColorFade(Image.Fill, -20%)
            Visible: =lblMainText.Visible
            Width: =821
            X: =272
            Y: =220
            ZIndex: =6

